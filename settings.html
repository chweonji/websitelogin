<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Bevan&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="settingsstyle.css">
</head>
<body>

<div class="settings-container">

    <div class="settingsleft">
        <h2>ACCOUNT SETTINGS</h2>
        <img src="profile1.jpg" class="settingsprofile">
        <div class="settingslocation">TOKYO CITY</div>
    </div>

    <div class="settingsdivider"></div>

    <div class="settingsright">
        <a href="Tokyo_City_Landing_Page.html" class="settingsclose">
            <i class="fa-solid fa-xmark"></i>
        </a>

        <label for="settings-name" class="settings-label">Full Name</label>
        <input type="text" id="settings-name" class="settings-input" readonly>

        <label for="settings-email" class="settings-label">Email Address</label>
        <input type="email" id="settings-email" class="settings-input" readonly>

        <label for="settings-address" class="settings-label">Address</label>
        <input type="text" id="settings-address" class="settings-input" readonly>

        <button id="updateBtn" class="settingschange">CHANGE PASSWORD</button>
    </div>
</div>

<script>
const updateBtn = document.getElementById('updateBtn');
if (updateBtn) {
    updateBtn.addEventListener('click', function() {
        // you could perform validation here before redirecting
        window.location.href = 'changepass.html';
    });
}

const name = localStorage.getItem("userFullname") || "";
const email = localStorage.getItem("userEmail") || "";
const address = localStorage.getItem("userAddress") || "";
const city = localStorage.getItem("userCity") || "";

document.getElementById("settings-name").value = name;
document.getElementById("settings-email").value = email;

document.getElementById("settings-address").value =
address && city ? address + ", " + city : address + city;
</script>

</body>
</html>
